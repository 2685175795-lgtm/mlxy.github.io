<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>马来西亚与新加坡旅行智能系统｜五城版</title>
<style>
:root{--bg:#f6f8fc;--card:#fff;--text:#172033;--muted:#667085;--line:#e5e7eb;--blue:#2563eb;--green:#16a34a;--orange:#f59e0b;--red:#ef4444;--purple:#7c3aed;--shadow:0 10px 28px rgba(15,23,42,.08);--radius:18px}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#eaf2ff 0,#f8fafc 300px,var(--bg) 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--text)}
header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.header-inner{max-width:1500px;margin:auto;padding:14px 18px;display:flex;gap:14px;align-items:center;justify-content:space-between} .brand{display:flex;gap:12px;align-items:center;min-width:260px} .logo{width:44px;height:44px;border-radius:15px;background:linear-gradient(135deg,#2563eb,#16a34a);color:white;display:grid;place-items:center;font-weight:900;box-shadow:var(--shadow)} h1{margin:0;font-size:20px;line-height:1.15} .sub{color:var(--muted);font-size:12px;margin-top:3px} .top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
button,.btn{border:0;border-radius:12px;padding:9px 12px;background:#111827;color:white;cursor:pointer;font-weight:800;font-size:13px;text-decoration:none;display:inline-flex;gap:6px;align-items:center;justify-content:center;white-space:nowrap} button.secondary{background:#e5e7eb;color:#111827} button.blue{background:var(--blue)} button.green{background:var(--green)} button.orange{background:var(--orange);color:#111827} button.red{background:var(--red)} button.ghost{background:white;color:#111827;border:1px solid var(--line)} button:disabled{opacity:.55;cursor:not-allowed}
main{max-width:1500px;margin:auto;padding:18px;display:grid;grid-template-columns:330px 1fr;gap:18px} .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)} .sidebar{padding:16px;height:calc(100vh - 92px);position:sticky;top:78px;overflow:auto} .content{min-width:0} .section-title{font-weight:900;font-size:15px;margin:0 0 10px;display:flex;align-items:center;justify-content:space-between} .hint{font-size:12px;color:var(--muted);line-height:1.6} input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 11px;background:white;font:inherit;color:var(--text);outline:none} input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)} .field{margin-bottom:10px} .label{font-size:12px;color:var(--muted);font-weight:800;margin-bottom:5px;display:block}
.city-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0} .city-tab{background:#f9fafb;color:#111827;border:1px solid var(--line);padding:10px;border-radius:12px;text-align:left;display:block} .city-tab.active{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8} .city-tab b{display:block;font-size:14px} .city-tab span{font-size:11px;color:var(--muted)}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0} .kpi{padding:10px;border-radius:14px;background:#f8fafc;border:1px solid var(--line)} .kpi b{font-size:18px;display:block} .kpi span{font-size:11px;color:var(--muted)}
.route-card{border:1px solid var(--line);border-radius:14px;background:#f8fafc;padding:10px;margin:8px 0} .route-card.active{background:#eff6ff;border-color:#bfdbfe} .route-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center} .route-row b{font-size:13px} .route-row small{display:block;color:var(--muted);font-size:11px;margin-top:2px} .days-input{width:65px;padding:7px;text-align:center}
.filters-row{display:grid;grid-template-columns:1.3fr .75fr .75fr .75fr .75fr;gap:10px;margin-bottom:12px} .toolbar{padding:14px;display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px} .toolbar h2{margin:0;font-size:18px} .toolbar p{margin:4px 0 0;color:var(--muted);font-size:12px} .view-toggle{display:flex;gap:8px;flex-wrap:wrap}
.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px} .card{background:white;border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 20px rgba(15,23,42,.05);overflow:hidden;display:flex;flex-direction:column;min-height:300px} .card.selected{border-color:#60a5fa;box-shadow:0 10px 28px rgba(37,99,235,.16)} .card.imported{border-color:#86efac;box-shadow:0 10px 28px rgba(22,163,74,.14)} .card.selected.imported{border-color:#60a5fa;box-shadow:0 10px 28px rgba(37,99,235,.18)} .imported-note{font-size:11px;font-weight:900;color:#166534;background:#dcfce7;border-radius:999px;padding:4px 7px;display:inline-block;margin-top:7px} .card-head{padding:13px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:flex-start} .checkbox{width:22px;height:22px;accent-color:var(--blue);flex:0 0 auto;margin-top:1px} .item-title{font-weight:900;font-size:15px;line-height:1.35} .item-desc{font-size:12px;color:var(--muted);line-height:1.55;margin-top:5px} .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px} .badge{font-size:11px;font-weight:800;padding:4px 7px;border-radius:999px;background:#f3f4f6;color:#374151} .badge.food{background:#fff7ed;color:#c2410c} .badge.attr{background:#eff6ff;color:#1d4ed8} .badge.low{background:#ecfdf5;color:#15803d} .badge.mid{background:#fefce8;color:#a16207} .badge.high{background:#fef2f2;color:#b91c1c}
.card-body{padding:13px;display:grid;gap:9px;flex:1} .info{display:grid;grid-template-columns:72px 1fr;gap:8px;font-size:12px;line-height:1.45} .info .k{color:var(--muted);font-weight:800} .card-actions{padding:12px;border-top:1px solid var(--line);display:flex;gap:7px;flex-wrap:wrap} .card-actions button,.card-actions a{font-size:12px;padding:7px 9px;border-radius:10px}
.table-wrap{overflow:auto;background:white;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)} table{border-collapse:collapse;width:100%;min-width:1200px} th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;font-size:12px;vertical-align:top} th{background:#f8fafc;color:#374151;position:sticky;top:0;z-index:2} tr.imported-row{background:#f0fdf4} .empty{padding:38px;text-align:center;color:var(--muted)}
.itinerary{padding:16px;margin-top:14px;display:none} .itinerary.show{display:block} .days{display:grid;gap:12px} .day{border:1px solid var(--line);border-radius:16px;background:#fff;padding:14px} .day h3{margin:0 0 10px;font-size:17px} .day h3 span{font-size:12px;color:var(--muted);font-weight:600} .transport-stop{border-left:4px solid #16a34a;background:#f0fdf4;border-radius:12px;padding:10px 12px;margin:8px 0} .stop{border-left:4px solid #2563eb;background:#f8fafc;border-radius:12px;padding:10px 12px;margin:8px 0} .stop b,.transport-stop b{display:block} .stop small,.transport-stop small{display:block;color:var(--muted);line-height:1.55;margin-top:2px}
.transport-panel{padding:14px;margin-bottom:14px} .transport-grid{display:grid;gap:10px} .segment{border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px} .segment-head{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-bottom:8px} .segment-head b{font-size:15px} .option-card{border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:8px;background:#f8fafc} .option-card.reco{border-color:#86efac;background:#f0fdf4} .option-card label{display:flex;gap:8px;align-items:flex-start;cursor:pointer} .option-card input{width:auto;margin-top:2px} .mini{font-size:11px;color:var(--muted)} .modal{position:fixed;inset:0;background:rgba(15,23,42,.38);display:none;align-items:center;justify-content:center;padding:18px;z-index:50} .modal.show{display:flex} .modal-card{max-width:760px;width:100%;max-height:90vh;overflow:auto;background:white;border-radius:20px;box-shadow:0 30px 70px rgba(15,23,42,.28);padding:18px} .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px} .full{grid-column:1/-1} .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#111827;color:white;padding:10px 14px;border-radius:999px;box-shadow:var(--shadow);display:none;z-index:90} .toast.show{display:block}
@media(max-width:1120px){main{grid-template-columns:1fr} .sidebar{position:static;height:auto} .cards{grid-template-columns:repeat(2,1fr)}} @media(max-width:680px){.header-inner{display:block} .top-actions{justify-content:flex-start;margin-top:10px} main{padding:10px} .cards{grid-template-columns:1fr} .filters-row{grid-template-columns:1fr 1fr} .toolbar{display:block} .view-toggle{margin-top:10px} .modal-grid{grid-template-columns:1fr} .city-tabs{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="header-inner"><div class="brand"><div class="logo">马新</div><div><h1>马来西亚与新加坡旅行智能系统｜五城版</h1><div class="sub">槟城 · 兰卡威 · 吉隆坡 · 马六甲 · 新加坡｜自由排序 · 交通方案 · 多人选择包 · 导入可见 · 自动行程单</div></div></div><div class="top-actions"><button class="ghost" onclick="previewItinerary()">预览行程单</button><button class="green" onclick="exportItineraryHTML()">导出行程单HTML</button><button class="blue" onclick="exportMyPack()">导出我的选择包</button><button class="secondary" onclick="document.getElementById('importFile').click()">导入他人选择</button><input id="importFile" type="file" accept=".json" style="display:none" onchange="importPack(event)"><button class="orange" onclick="exportCSV()">导出CSV总表</button></div></div></header>
<main>
<aside class="panel sidebar">
  <div class="section-title">个人与筛选</div>
  <div class="field"><label class="label">你的昵称</label><input id="nick" placeholder="例如 王森朝" oninput="saveAll();render()"></div>
  <div class="kpis"><div class="kpi"><b id="kpiTotal">0</b><span>系统项目</span></div><div class="kpi"><b id="kpiSelected">0</b><span>已勾选</span></div><div class="kpi"><b id="kpiCities">5</b><span>城市模块</span></div><div class="kpi"><b id="kpiPeople">1</b><span>选择人</span></div></div>
  <div class="section-title">城市顺序与时间 <button class="ghost" onclick="resetRoute()">重置</button></div>
  <div class="field"><label class="label">出发日期/行程起始日</label><input id="startDate" type="date" value="2026-07-27" onchange="saveRoute();renderRouteEditor();renderTransportPlanner()"></div>
  <div class="hint">可自由调整城市顺序和每城停留天数。自动行程会按这里的顺序生成，并在城市之间插入你选择的交通方案。</div>
  <div id="routeEditor"></div>
  <div class="section-title" style="margin-top:14px">城市模块</div>
  <div id="cityTabs" class="city-tabs"></div>
  <div class="field"><label class="label">搜索</label><input id="search" placeholder="景点/美食/地址/标签" oninput="render()"></div>
  <div class="field"><label class="label">类型</label><select id="typeFilter" onchange="render()"><option value="全部">全部</option><option value="景点">景点</option><option value="美食">美食</option></select></div>
  <div class="field"><label class="label">预算</label><select id="budgetFilter" onchange="render()"><option value="全部">全部</option><option value="低">低预算</option><option value="中">中预算</option><option value="高">高预算</option></select></div>
  <div class="field"><label class="label">时间段</label><select id="timeFilter" onchange="render()"><option value="全部">全部</option><option value="breakfast">早餐</option><option value="morning">上午</option><option value="lunch">午餐</option><option value="afternoon">下午</option><option value="dessert">甜品/加餐</option><option value="dinner">晚餐</option><option value="evening">傍晚</option><option value="night">夜间</option><option value="flex">弹性</option></select></div>
  <div class="field"><label class="label">显示</label><select id="peopleFilter" onchange="render()"><option value="all">全部项目</option><option value="mine">只看我选的</option><option value="any">只看有人选的</option></select></div>
  <button class="blue" style="width:100%" onclick="openCustomModal()">添加自定义景点/美食</button>
  <div class="section-title" style="margin-top:14px">谁想去</div><div id="peopleBox" class="hint"></div>
</aside>
<section class="content">
  <div class="panel toolbar"><div class="toolbar-left"><h2 id="cityTitle">全部项目</h2><p id="citySub">选择想去的点，再生成自动排序行程。</p></div><div class="view-toggle"><button class="ghost" onclick="setView('cards')">卡片</button><button class="ghost" onclick="setView('table')">表格</button><button class="red" onclick="clearMine()">清空我的选择</button></div></div>
  <div class="panel transport-panel"><div class="section-title">城市间交通方案 <span class="mini">按当前城市顺序自动生成</span></div><div class="hint">可为每段选择大巴、火车、飞机、轮渡/组合交通。价格按7月底常见区间估算，正式下单前要再查当天票价和行李费。</div><div id="transportPlanner" class="transport-grid"></div></div>
  <div id="list"></div><div id="itinerary" class="panel itinerary"></div>
</section>
</main>
<div class="modal" id="customModal"><div class="modal-card"><div class="section-title">添加自定义项目 <button class="ghost" onclick="closeCustomModal()">关闭</button></div><div class="modal-grid"><div><label class="label">城市</label><select id="cCity"><option value="槟城">槟城</option><option value="兰卡威">兰卡威</option><option value="吉隆坡">吉隆坡</option><option value="马六甲">马六甲</option><option value="新加坡">新加坡</option></select></div><div><label class="label">类型</label><select id="cType"><option>景点</option><option>美食</option></select></div><div><label class="label">名称</label><input id="cName"></div><div><label class="label">区域</label><input id="cArea"></div><div class="full"><label class="label">地址</label><input id="cAddress"></div><div><label class="label">价格</label><input id="cPrice" placeholder="例如 RM20/人"></div><div><label class="label">人民币</label><input id="cCny" placeholder="例如 约¥33"></div><div><label class="label">营业时间</label><input id="cHours"></div><div><label class="label">预约</label><input id="cReserve" placeholder="无需预约/建议预约"></div><div><label class="label">游玩时长</label><input id="cDuration" placeholder="1小时"></div><div><label class="label">时间段</label><select id="cTime"><option value="morning">上午</option><option value="lunch">午餐</option><option value="afternoon">下午</option><option value="dinner">晚餐</option><option value="evening">傍晚</option><option value="night">夜间</option><option value="flex">弹性</option></select></div><div><label class="label">预算</label><select id="cBudget"><option>低</option><option>中</option><option>高</option></select></div><div class="full"><label class="label">说明</label><textarea id="cDesc" rows="3"></textarea></div></div><div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end"><button class="secondary" onclick="closeCustomModal()">取消</button><button class="blue" onclick="addCustomItem()">添加并勾选</button></div></div></div>
<div class="toast" id="toast">已完成</div>

function init(){ $('nick').value=localStorage.getItem('ms_nick_v5')||'我'; $('startDate').value=route.startDate||'2026-07-27'; renderRouteEditor(); renderCityTabs(); renderTransportPlanner(); render(); }
function nick(){return $('nick').value.trim()||'我'}
function saveAll(){localStorage.setItem('ms_selected_v5',JSON.stringify([...selected]));localStorage.setItem('ms_imported_v5',JSON.stringify(imported));localStorage.setItem('ms_custom_v5',JSON.stringify(customItems));localStorage.setItem('ms_nick_v5',nick());}
function saveRoute(){ route.startDate=$('startDate').value||'2026-07-27'; localStorage.setItem('ms_route_v5',JSON.stringify(route)); }
function resetRoute(){route={order:['槟城','兰卡威','吉隆坡','马六甲','新加坡'],days:{'槟城':2,'兰卡威':2,'吉隆坡':2,'马六甲':1,'新加坡':1},startDate:$('startDate').value||'2026-07-27'}; saveRoute(); renderRouteEditor(); renderCityTabs(); renderTransportPlanner(); render();}
function moveCity(city,dir){const i=route.order.indexOf(city); const j=i+dir; if(j<0||j>=route.order.length)return; [route.order[i],route.order[j]]=[route.order[j],route.order[i]]; saveRoute(); renderRouteEditor(); renderCityTabs(); renderTransportPlanner(); render();}
function setDays(city,val){route.days[city]=Math.max(0,parseInt(val||0,10)); saveRoute(); renderTransportPlanner();}
function renderRouteEditor(){const box=$('routeEditor'); box.innerHTML=route.order.map((c,i)=>`<div class="route-card ${currentCity===c?'active':''}"><div class="route-row"><div><b>${i+1}. ${c}</b><small>${(items.filter(x=>x.city===c).length)}个项目｜停留天数</small></div><input class="days-input" type="number" min="0" max="7" value="${route.days[c]??1}" onchange="setDays('${c}',this.value)"><div><button class="ghost" onclick="moveCity('${c}',-1)" ${i===0?'disabled':''}>↑</button><button class="ghost" onclick="moveCity('${c}',1)" ${i===route.order.length-1?'disabled':''}>↓</button></div></div></div>`).join('');}
function renderCityTabs(){const cities=['全部',...route.order]; $('cityTabs').innerHTML=cities.map(c=>`<button class="city-tab ${currentCity===c?'active':''}" onclick="setCity('${c}')"><b>${c}</b><span>${c==='全部'?items.length:items.filter(x=>x.city===c).length} 项</span></button>`).join('');}
function setCity(c){currentCity=c;localStorage.setItem('ms_city_v5',c);renderRouteEditor();renderCityTabs();render();}
function setView(v){view=v;localStorage.setItem('ms_view_v5',v);render();}
function allSelectedIds(){const u=new Set([...selected]); Object.values(imported).forEach(arr=>(arr||[]).forEach(id=>u.add(id))); return u;}
function importedPeopleFor(id){const p=[]; Object.entries(imported).forEach(([name,ids])=>{if((ids||[]).includes(id))p.push(name)}); return p;}
function peopleFor(id){const p=[]; if(selected.has(id))p.push(nick()); importedPeopleFor(id).forEach(n=>p.push(n)); return p;}
function isImportedSelected(id){return importedPeopleFor(id).length>0}
function filteredItems(){items=[...BASE_ITEMS,...customItems]; let q=($('search').value||'').toLowerCase(); let type=$('typeFilter').value,budget=$('budgetFilter').value,t=$('timeFilter').value,pf=$('peopleFilter').value; const any=allSelectedIds(); return items.filter(x=>{const personOK=!focusPerson||(focusPerson===nick()?selected.has(x.id):((imported[focusPerson]||[]).includes(x.id))); return (currentCity==='全部'||x.city===currentCity)&&(type==='全部'||x.type===type)&&(budget==='全部'||x.budget===budget)&&(t==='全部'||x.time===t)&&(!q||JSON.stringify(x).toLowerCase().includes(q))&&(pf==='all'||(pf==='mine'?selected.has(x.id):any.has(x.id)))&&personOK}).sort((a,b)=>route.order.indexOf(a.city)-route.order.indexOf(b.city)||(TIME_ORDER[a.time]||60)-(TIME_ORDER[b.time]||60)||a.order-b.order)}
function render(){items=[...BASE_ITEMS,...customItems]; renderRouteEditor(); renderCityTabs(); updateKpis(); updatePeopleBox(); const list=filteredItems(); $('cityTitle').textContent=currentCity==='全部'?'全部项目':currentCity+'模块'; $('citySub').textContent=`当前显示 ${list.length} 项${focusPerson?'｜正在只看 '+focusPerson+' 的选择':''}｜勾选后可生成自动行程`;  $('list').innerHTML = list.length? (view==='cards'?renderCards(list):renderTable(list)) : `<div class="panel empty">没有匹配项目，换个筛选条件看看。</div>`;}
function updateKpis(){$('kpiTotal').textContent=items.length;$('kpiSelected').textContent=selected.size;$('kpiCities').textContent=route.order.length;$('kpiPeople').textContent=1+Object.keys(imported).length;}
function updatePeopleBox(){items=[...BASE_ITEMS,...customItems]; const names=[nick(),...Object.keys(imported)]; const html=names.map(n=>{const ids=n===nick()?[...selected]:(imported[n]||[]); const matched=ids.map(id=>items.find(x=>x.id===id)).filter(Boolean); const preview=matched.slice(0,6).map(x=>escapeHTML(x.city+'｜'+x.name)).join('<br>'); const miss=ids.length-matched.length; return `<div style="border:1px solid #e5e7eb;border-radius:12px;padding:8px;margin:6px 0;background:${n===nick()?'#eff6ff':'#f0fdf4'}"><b>${escapeHTML(n)}</b>：${ids.length} 项，当前可显示 ${matched.length} 项${miss>0?`，未匹配 ${miss} 项`:''}<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap"><button class="ghost" style="font-size:11px;padding:5px 7px" onclick="focusOnPerson('${jsString(n)}')">只看TA选择</button>${n!==nick()?`<button class="ghost" style="font-size:11px;padding:5px 7px" onclick="mergePersonToMine('${jsString(n)}')">合并到我的选择</button><button class="ghost" style="font-size:11px;padding:5px 7px" onclick="removeImportedPerson('${jsString(n)}')">删除</button>`:''}</div>${preview?`<div style="margin-top:6px;line-height:1.5">${preview}${matched.length>6?'<br>……':''}</div>`:''}</div>`}).join(''); $('peopleBox').innerHTML=(focusPerson?`<div style="margin-bottom:8px"><button class="ghost" onclick="clearPersonFocus()">取消只看某人</button></div>`:'')+(html||'暂无');}
function focusOnPerson(name){focusPerson=name; currentCity='全部'; $('peopleFilter').value='any'; $('search').value=''; render(); window.scrollTo({top:0,behavior:'smooth'});}
function clearPersonFocus(){focusPerson=null; render();}
function mergePersonToMine(name){(imported[name]||[]).forEach(id=>selected.add(id)); saveAll(); render(); toast('已合并 '+name+' 的选择到我的选择');}
function removeImportedPerson(name){if(confirm('确定删除 '+name+' 的导入选择吗？')){delete imported[name]; if(focusPerson===name)focusPerson=null; saveAll(); render();}}
function toggle(id){selected.has(id)?selected.delete(id):selected.add(id);saveAll();render();}
function renderCards(list){return `<div class="cards">${list.map(cardHTML).join('')}</div>`}
function cardHTML(x){let ps=peopleFor(x.id); let ips=importedPeopleFor(x.id); return `<div class="card ${selected.has(x.id)?'selected':''} ${ips.length?'imported':''}"><div class="card-head"><input class="checkbox" type="checkbox" ${selected.has(x.id)?'checked':''} onchange="toggle('${x.id}')"><div><div class="item-title">${escapeHTML(x.name)}</div><div class="item-desc">${escapeHTML(x.desc)}</div><div class="badges"><span class="badge ${x.type==='美食'?'food':'attr'}">${x.type}</span><span class="badge ${x.budget==='低'?'low':x.budget==='中'?'mid':'high'}">${x.budget}预算</span><span class="badge">${timeName(x.time)}</span>${x.tags.slice(0,3).map(t=>`<span class="badge">${escapeHTML(t)}</span>`).join('')}</div>${ips.length?`<div class="imported-note">已被 ${ips.map(escapeHTML).join(' / ')} 选择</div>`:''}</div></div></div><div class="card-body"><div class="info"><span class="k">城市/区域</span><span>${x.city}｜${escapeHTML(x.area)}</span></div><div class="info"><span class="k">地址</span><span>${escapeHTML(x.address)}</span></div><div class="info"><span class="k">价格</span><span>${escapeHTML(x.price)}（${escapeHTML(x.cny)}）</span></div><div class="info"><span class="k">时间</span><span>${escapeHTML(x.hours)}</span></div><div class="info"><span class="k">预约</span><span>${escapeHTML(x.reserve)}</span></div><div class="info"><span class="k">谁想去</span><span>${ps.length?ps.map(escapeHTML).join(' / '):'—'}</span></div></div><div class="card-actions"><button class="ghost" onclick="copyText('${jsString(x.name)}')">复制名称</button><button class="ghost" onclick="copyText('${jsString(x.address)}')">复制地址</button><button class="ghost" onclick="copyText('${jsString(x.copyText)}')">复制整条</button><a class="btn" target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(x.mapQuery)}">地图</a></div></div>`}
function renderTable(list){return `<div class="table-wrap"><table><thead><tr><th>选</th><th>城市</th><th>类型</th><th>名称</th><th>地址</th><th>价格</th><th>时间</th><th>预约</th><th>说明</th><th>谁想去</th><th>操作</th></tr></thead><tbody>${list.map(x=>`<tr class="${isImportedSelected(x.id)?'imported-row':''}"><td><input type="checkbox" ${selected.has(x.id)?'checked':''} onchange="toggle('${x.id}')"></td><td>${x.city}</td><td>${x.type}</td><td><b>${escapeHTML(x.name)}</b></td><td>${escapeHTML(x.address)}</td><td>${escapeHTML(x.price)}<br>${escapeHTML(x.cny)}</td><td>${escapeHTML(x.hours)}<br>${timeName(x.time)}</td><td>${escapeHTML(x.reserve)}</td><td>${escapeHTML(x.desc)}</td><td>${peopleFor(x.id).join(' / ')||'—'}</td><td><button class="ghost" onclick="copyText('${jsString(x.address)}')">复制地址</button></td></tr>`).join('')}</tbody></table></div>`}
function renderTransportPlanner(){saveRoute(); const segs=[]; const active=route.order.filter(c=>(route.days[c]??1)>0); for(let i=0;i<active.length-1;i++)segs.push([active[i],active[i+1]]); $('transportPlanner').innerHTML=segs.length?segs.map(segmentHTML).join(''):'<div class="hint">至少设置两个城市的停留天数大于0，才会生成交通段。</div>'; localStorage.setItem('ms_transport_v5',JSON.stringify(transportChoices));}
function optionsFor(a,b){return TRANSPORTS[`${a}->${b}`] || TRANSPORTS[`${b}->${a}`] || [{mode:'待规划',title:`${a} → ${b}`,duration:'待查',price:'待查',cny:'待查',booking:'自行比价',note:'这个城市顺序不是常规路线，建议手动查票。',score:1}];}
function segmentHTML([a,b]){const key=`${a}->${b}`; const opts=optionsFor(a,b); if(!transportChoices[key]) transportChoices[key]=0; return `<div class="segment"><div class="segment-head"><b>${a} → ${b}</b><span class="mini">${opts.length}种方案</span></div>${opts.map((o,i)=>`<div class="option-card ${i===0?'reco':''}"><label><input type="radio" name="tr-${key}" ${transportChoices[key]===i?'checked':''} onchange="transportChoices['${key}']=${i};renderTransportPlanner()"><div><b>${o.mode}｜${escapeHTML(o.title)} ${i===0?'（推荐）':''}</b><small>${escapeHTML(o.duration)}｜${escapeHTML(o.price)}（${escapeHTML(o.cny)}）｜订票：${escapeHTML(o.booking)}</small><small>${escapeHTML(o.note)}</small></div></label></div>`).join('')}</div>`}
function chosenTransport(a,b){const key=`${a}->${b}`; const opts=optionsFor(a,b); return opts[transportChoices[key]||0]||opts[0];}
function selectedItemsForItinerary(){const union=allSelectedIds(); return items.filter(x=>union.has(x.id)).sort((a,b)=>route.order.indexOf(a.city)-route.order.indexOf(b.city)||(TIME_ORDER[a.time]||60)-(TIME_ORDER[b.time]||60)||a.order-b.order)}
function addDays(dateStr,n){const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10)}
function buildDays(chosen){const days=[]; let dayOffset=0; route.order.forEach((city,ci)=>{const n=Math.max(0,route.days[city]??0); if(n<=0)return; const cityItems=chosen.filter(x=>x.city===city).sort((a,b)=>(TIME_ORDER[a.time]||60)-(TIME_ORDER[b.time]||60)||a.order-b.order); const buckets=Array.from({length:n},()=>[]); cityItems.forEach((it,i)=>{let target=Math.min(n-1, Math.floor(i/Math.ceil(Math.max(1,cityItems.length)/n))); buckets[target].push(it);}); for(let j=0;j<n;j++){const trans = (j===0 && days.length>0) ? chosenTransport(route.order.filter(c=>(route.days[c]??0)>0)[activeIndex(city)-1], city) : null; days.push({city,cityDay:j+1,date:addDays(route.startDate,dayOffset),items:buckets[j]||[],transport:trans}); dayOffset++;} }); return days;}
function activeIndex(city){return route.order.filter(c=>(route.days[c]??0)>0).indexOf(city)}
function previewItinerary(){const chosen=selectedItemsForItinerary(); const box=$('itinerary'); const days=buildDays(chosen); box.className='panel itinerary show'; box.innerHTML=`<div class="section-title">自动排序行程单 <span class="mini">路线：${route.order.filter(c=>(route.days[c]??0)>0).join(' → ')}</span></div><div class="hint" style="margin-bottom:12px">已按你的城市顺序、停留天数、饭点和所选交通自动排序。每段交通可在上方交通模块切换。</div><div class="days">${days.map(dayHTML).join('')}</div>`; box.scrollIntoView({behavior:'smooth'});}
function dayHTML(d,i){return `<div class="day"><h3>D${i+1}｜${d.date}｜${d.city} <span>第${d.cityDay}天｜${d.items.length}项</span></h3>${d.transport?`<div class="transport-stop"><b>抵达交通｜${escapeHTML(d.transport.mode)}｜${escapeHTML(d.transport.title)}</b><small>${escapeHTML(d.transport.duration)}｜${escapeHTML(d.transport.price)}（${escapeHTML(d.transport.cny)}）｜订票：${escapeHTML(d.transport.booking)}</small><small>${escapeHTML(d.transport.note)}</small></div>`:''}<div class="timeline">${d.items.length?d.items.map(x=>`<div class="stop"><b>${timeName(x.time)}｜${escapeHTML(x.name)}</b><small>${escapeHTML(x.area)}｜${escapeHTML(x.address)}</small><small>价格：${escapeHTML(x.price)}（${escapeHTML(x.cny)}）｜时长：${escapeHTML(x.duration)}｜预约：${escapeHTML(x.reserve)}</small><small>${escapeHTML(x.desc)}</small></div>`).join(''):'<div class="empty">这一天还没有选择项目，可在左侧增加该城市天数或勾选项目。</div>'}</div></div>`}
function exportItineraryHTML(){const chosen=selectedItemsForItinerary(); const days=buildDays(chosen); const body=`<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>马新旅行行程单</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',Arial,sans-serif;line-height:1.6;color:#111827;padding:22px;background:#f8fafc}.day{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:16px;margin:14px 0}.stop{border-left:4px solid #2563eb;background:#f8fafc;padding:10px 12px;margin:8px 0;border-radius:10px}.tr{border-left:4px solid #16a34a;background:#f0fdf4;padding:10px 12px;margin:8px 0;border-radius:10px}small{display:block;color:#6b7280}</style></head><body><h1>马来西亚与新加坡旅行行程单</h1><p>路线：${route.order.filter(c=>(route.days[c]??0)>0).join(' → ')}｜导出：${new Date().toLocaleString()}</p>${days.map((d,i)=>`<div class="day"><h2>D${i+1}｜${d.date}｜${d.city}</h2>${d.transport?`<div class="tr"><b>交通｜${escapeHTML(d.transport.mode)}｜${escapeHTML(d.transport.title)}</b><small>${escapeHTML(d.transport.duration)}｜${escapeHTML(d.transport.price)}（${escapeHTML(d.transport.cny)}）</small><small>${escapeHTML(d.transport.note)}</small></div>`:''}${d.items.map(x=>`<div class="stop"><b>${timeName(x.time)}｜${escapeHTML(x.name)}</b><small>${escapeHTML(x.address)}</small><small>价格：${escapeHTML(x.price)}（${escapeHTML(x.cny)}）｜营业：${escapeHTML(x.hours)}｜预约：${escapeHTML(x.reserve)}</small><small>${escapeHTML(x.desc)}</small></div>`).join('')}</div>`).join('')}</body></html>`; downloadText('马新旅行自动行程单_五城版.html',body,'text/html');}
function exportMyPack(){items=[...BASE_ITEMS,...customItems]; const selectedItems=items.filter(x=>selected.has(x.id)).map(x=>({id:x.id,city:x.city,type:x.type,name:x.name,area:x.area,address:x.address,price:x.price,cny:x.cny,hours:x.hours,reserve:x.reserve,duration:x.duration,time:x.time,tags:x.tags,desc:x.desc,budget:x.budget,order:x.order,mapQuery:x.mapQuery,copyText:x.copyText})); const data={version:5,app:'马新旅行智能系统五城版',person:nick(),exportedAt:new Date().toISOString(),route,transportChoices,selectedIds:[...selected],selectedItems,customItems:customItems.filter(x=>selected.has(x.id))}; downloadText(`马新旅行选择包_${nick()}.json`,JSON.stringify(data,null,2),'application/json');}
function simpleHash(str){let h=0; str=String(str||''); for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i); h|=0} return Math.abs(h).toString(36)}
function ensureImportedSnapshotItem(snap, person){items=[...BASE_ITEMS,...customItems]; if(!snap||!snap.name)return null; if(snap.id && items.some(x=>x.id===snap.id))return snap.id; let found=items.find(x=>x.city===snap.city && x.name===snap.name) || items.find(x=>x.name===snap.name && x.address===snap.address); if(found)return found.id; const city=CITIES.includes(snap.city)?snap.city:(route.order[0]||'槟城'); const id='imported-'+simpleHash(person+'|'+city+'|'+snap.name+'|'+(snap.address||'')); if(!items.some(x=>x.id===id)){customItems.push({id,city,type:snap.type||'景点',name:snap.name,area:snap.area||'导入项目',address:snap.address||'地址待补充',price:snap.price||'待补充',cny:snap.cny||'待补充',hours:snap.hours||'待补充',reserve:snap.reserve||'待确认',duration:snap.duration||'1小时',time:snap.time||'flex',tags:Array.isArray(snap.tags)?snap.tags:['导入'],desc:(snap.desc||'从他人选择包导入的项目。'),budget:snap.budget||'中',order:snap.order||999,mapQuery:snap.mapQuery||((snap.name||'')+' '+(snap.address||city)),copyText:snap.copyText||`${city}｜${snap.name}｜${snap.address||'地址待补充'}`});}
 return id;}
function importPack(evt){const file=evt.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=e=>{try{const data=JSON.parse(e.target.result);let person=data.person||data.nickname||data.nick||prompt('请输入这份选择包的昵称：','朋友')||'朋友'; let ids=[...(data.selectedIds||data.selected||data.ids||[])]; const snaps=[...(data.selectedItems||[])]; if(Array.isArray(data.customItems))snaps.push(...data.customItems); snaps.forEach(s=>{const id=ensureImportedSnapshotItem(s,person); if(id)ids.push(id)}); ids=[...new Set(ids)].filter(Boolean); imported[person]=ids; saveAll(); currentCity='全部'; focusPerson=person; $('peopleFilter').value='any'; $('search').value=''; render(); const matched=ids.filter(id=>items.some(x=>x.id===id)).length; toast('已导入 '+person+' 的选择，显示 '+matched+' 项'); if(!matched) alert('已读取选择包，但没有匹配到可显示项目。请让对方使用新版系统重新导出选择包；新版会携带项目名称和地址，导入后一定能显示。');}catch(err){console.error(err);alert('导入失败：请选择本系统导出的 JSON 选择包')} evt.target.value='';}; reader.readAsText(file,'utf-8');}
function exportCSV(){const header=['城市','类型','名称','区域','地址','价格','人民币','营业时间','预约','时长','适合时间','预算','说明','谁想去']; const rows=items.map(x=>[x.city,x.type,x.name,x.area,x.address,x.price,x.cny,x.hours,x.reserve,x.duration,timeName(x.time),x.budget,x.desc,peopleFor(x.id).join(' / ')]); const csv=[header,...rows].map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\\n'); downloadText('马新旅行景点美食交通总表_五城版.csv','﻿'+csv,'text/csv;charset=utf-8');}
function clearMine(){if(confirm('确定清空你的勾选吗？')){selected.clear();saveAll();render();}}
function addCustomItem(){const name=$('cName').value.trim(); if(!name){alert('请填写名称');return} const city=$('cCity').value; const it={id:'custom-'+Date.now(),city,type:$('cType').value,name,area:$('cArea').value.trim()||'自定义',address:$('cAddress').value.trim()||'地址待补充',price:$('cPrice').value.trim()||'待补充',cny:$('cCny').value.trim()||'待补充',hours:$('cHours').value.trim()||'待补充',reserve:$('cReserve').value.trim()||'待确认',duration:$('cDuration').value.trim()||'1小时',time:$('cTime').value,tags:['自定义'],desc:$('cDesc').value.trim()||'自定义添加项目。',budget:$('cBudget').value,order:999,mapQuery:name+' '+($('cAddress').value.trim()||city),copyText:city+'｜'+name+'｜'+($('cAddress').value.trim()||'地址待补充')}; customItems.push(it); selected.add(it.id); saveAll(); closeCustomModal(); render(); toast('已添加并勾选');}
function openCustomModal(){$('customModal').classList.add('show')} function closeCustomModal(){$('customModal').classList.remove('show')}
function timeName(t){return {breakfast:'早餐',morning:'上午',lunch:'午餐',afternoon:'下午',dessert:'甜品/加餐',dinner:'晚餐',evening:'傍晚',night:'夜间',flex:'弹性'}[t]||'弹性'}
function escapeHTML(str){return String(str??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function jsString(str){return String(str??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ')}
function copyText(text){if(navigator.clipboard&&window.isSecureContext)navigator.clipboard.writeText(text).then(()=>toast('已复制'));else{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('已复制')}}
function downloadText(filename,text,mime){const blob=new Blob([text],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}
init();
</script>
